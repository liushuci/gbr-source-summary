name: gbr-source-summary

channels:
  - conda-forge
  - defaults

dependencies:
  # ---------------------------------------------------------------------------
  # Python
  # ---------------------------------------------------------------------------
  - python=3.12

  # ---------------------------------------------------------------------------
  # Core scientific stack
  # ---------------------------------------------------------------------------
  - numpy=1.26.4
  - pandas=2.2.3
  - scipy=1.15.3

  # ---------------------------------------------------------------------------
  # Spatial / GIS
  # ---------------------------------------------------------------------------
  - geopandas=1.1.0
  - shapely=2.1.1
  - pyproj=3.7.1
  - fiona=1.10.1
  - rasterio=1.4.3
  - gdal=3.10.3

  # ---------------------------------------------------------------------------
  # Plotting
  # ---------------------------------------------------------------------------
  - matplotlib=3.10.3
  - seaborn=0.13.2

  # ---------------------------------------------------------------------------
  # Excel / reporting
  # ---------------------------------------------------------------------------
  - openpyxl=3.1.5
  - xlsxwriter=3.2.3

  # ---------------------------------------------------------------------------
  # Notebooks
  # ---------------------------------------------------------------------------
  - jupyterlab=4.4.3
  - notebook=7.4.3
  - ipykernel=6.29.5

  # ---------------------------------------------------------------------------
  # Utilities
  # ---------------------------------------------------------------------------
  - tqdm=4.67.1
  - pyyaml=6.0.2

  # ---------------------------------------------------------------------------
  # Testing
  # ---------------------------------------------------------------------------
  - pytest=8.4.0

  - pip

  - pip:

      # GBR package itself
      - git+https://github.com/liushuci/gbr-source-summary.git